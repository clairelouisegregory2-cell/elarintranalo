<!DOCTYPE html>
<html>
<head>
  <title>Élarin Translator</title>
</head>
<body>

<input id="word" placeholder="Enter English or Élarin">

<button onclick="translateWord()">
  Translate
</button>

<div id="result"></div>

<script>
const dictionary = {
  elys: "hope",
  vaelor: "courage",
  moriq: "ocean",
  kyrath: "wisdom",
  ilune: "love",
  nyther: "time"
};

function translateWord() {
  const input =
    document.getElementById("word")
    .value
    .toLowerCase()
    .trim();

  if (!input) return;

  if (dictionary[input]) {
    document.getElementById("result").textContent =
      input + " → " + dictionary[input];
    return;
  }

  for (const [elarin, english] of Object.entries(dictionary)) {
    if (english.toLowerCase() === input) {
      document.getElementById("result").textContent =
        input + " → " + elarin;
      return;
    }
  }

  document.getElementById("result").textContent =
    "Word not found";
}
</script>

</body>
</html>
