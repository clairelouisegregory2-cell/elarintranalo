<script>
const roots = [
  "el","va","mor","kyr","ilu",
  "ny","ser","qir","thal","ryn",
  "lor","eth","ara","vel","lun"
];

const meanings = [
  "hope","wisdom","ocean","love",
  "time","truth","memory","destiny",
  "spirit","dream","light","shadow",
  "path","heart","star"
];

function generateWord() {
  let word = "";

  const parts = 2 + Math.floor(Math.random() * 2);

  for(let i = 0; i < parts; i++) {
    word += roots[Math.floor(Math.random() * roots.length)];
  }

  return word;
}

function translateWord() {
  const input =
    document.getElementById("word")
    .value
    .toLowerCase()
    .trim();

  if(!input) return;

  let meaning = meanings[0];

  let hash = 0;

  for(let i = 0; i < input.length; i++) {
    hash += input.charCodeAt(i);
  }

  meaning = meanings[hash % meanings.length];

  document.getElementById("result").textContent =
    input + " → " + meaning;
}
</script>
