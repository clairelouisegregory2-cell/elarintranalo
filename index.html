<script>
function makeElarin(word) {
  const roots = [
    "el","va","mor","kyr","ilu",
    "ny","ser","qir","thal","ryn",
    "lor","eth","ara","vel","lun"
  ];

  let hash = 0;

  for (let i = 0; i < word.length; i++) {
    hash += word.charCodeAt(i);
  }

  let result = "";

  result += roots[hash % roots.length];
  result += roots[(hash * 3) % roots.length];
  result += roots[(hash * 7) % roots.length];

  return result;
}

function translateWord() {
  const input =
    document.getElementById("word")
    .value
    .toLowerCase()
    .trim();

  if (!input) return;

  document.getElementById("result").textContent =
    input + " → " + makeElarin(input);
}
</script>
