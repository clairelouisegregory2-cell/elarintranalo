<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Élarin Translator</title>
<style>
body{
  font-family:Arial,sans-serif;
  background:#111;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.box{
  text-align:center;
}
input{
  padding:10px;
  width:250px;
}
button{
  padding:10px;
}
</style>
</head>
<body>

<div class="box">
  <h1>Élarin Translator</h1>

  <input id="word" placeholder="Enter a word">

  <button onclick="translateWord()">Translate</button>

  <p id="result"></p>
</div>

<script>
const dictionary = {
  elys: "hope",
  vaelor: "courage",
  moriq: "ocean",
  kyrath: "wisdom",
  ilune: "love",
  nyther: "time"
};

function translateWord() {
  const word =
    document.getElementById("word").value.toLowerCase();

  document.getElementById("result").textContent =
    dictionary[word] || "Word not found";
}
</script>

</body>
</html>
