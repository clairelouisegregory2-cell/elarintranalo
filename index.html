<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Élarin Translator</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;

  background:
  radial-gradient(circle at top,
  #4338ca,
  #0f172a 45%,
  #020617);

  color:white;
  font-family:'Inter',sans-serif;
}

.card{
  width:100%;
  max-width:700px;

  background:rgba(255,255,255,.06);
  backdrop-filter:blur(20px);

  border:1px solid rgba(255,255,255,.1);

  border-radius:32px;
  padding:50px;

  box-shadow:
  0 0 40px rgba(99,102,241,.3);
}

.logo{
  text-align:center;

  font-family:'Cinzel',serif;

  font-size:4rem;
  font-weight:700;

  margin-bottom:10px;

  background:
  linear-gradient(
  90deg,
  #fff,
  #c7d2fe,
  #818cf8);

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  text-align:center;
  color:#cbd5e1;
  margin-bottom:35px;
  line-height:1.6;
}

input{
  width:100%;
  padding:18px;

  border:none;
  border-radius:18px;

  background:rgba(255,255,255,.08);

  color:white;
  font-size:1rem;
}

input::placeholder{
  color:#94a3b8;
}

input:focus{
  outline:none;
  box-shadow:0 0 0 2px #818cf8;
}

button{
  width:100%;
  margin-top:16px;

  padding:18px;

  border:none;
  border-radius:18px;

  cursor:pointer;

  color:white;
  font-size:1rem;
  font-weight:600;

  background:
  linear-gradient(
  135deg,
  #6366f1,
  #4f46e5);

  transition:.25s;
}

button:hover{
  transform:translateY(-2px);
}

#result{
  margin-top:25px;
  text-align:center;
  font-size:1.3rem;
  color:#e2e8f0;
}

.dictionary{
  margin-top:40px;
}

.dictionary h2{
  text-align:center;
  margin-bottom:20px;
  font-family:'Cinzel',serif;
}

.word{
  display:flex;
  justify-content:space-between;

  padding:12px 16px;

  background:rgba(255,255,255,.04);

  border-radius:12px;

  margin-bottom:10px;
}

.quote{
  margin-top:35px;
  text-align:center;
  color:#94a3b8;
  font-style:italic;
}
</style>
</head>

<body>

<div class="card">

  <div class="logo">Élarin</div>

  <div class="subtitle">
    The Language of Memory, Destiny, and Becoming
  </div>

  <input
    id="word"
    placeholder="Enter an Élarin word..."
  >

  <button onclick="translateWord()">
    Translate
  </button>

  <div id="result"></div>

  <div class="dictionary">

    <h2>Core Vocabulary</h2>

    <div class="word">
      <span>elys</span>
      <span>hope</span>
    </div>

    <div class="word">
      <span>vaelor</span>
      <span>courage</span>
    </div>

    <div class="word">
      <span>moriq</span>
      <span>ocean</span>
    </div>

    <div class="word">
      <span>kyrath</span>
      <span>wisdom</span>
    </div>

    <div class="word">
      <span>ilune</span>
      <span>love</span>
    </div>

    <div class="word">
      <span>nyther</span>
      <span>time</span>
    </div>

  </div>

  <div class="quote">
    “Qir nei found. Qir va noren.”
    <br>
    Truth is not found. Truth is created.
  </div>

</div>

<script>
const dictionary = {
  elys: "hope",
  vaelor: "courage",
  moriq: "ocean",
  kyrath: "wisdom",
  ilune: "love",
  nyther: "time"
};

function translateWord() {

  const word =
  document.getElementById("word")
  .value
  .toLowerCase()
  .trim();

  const result =
  dictionary[word] || "Word not found";

  document.getElementById("result")
  .textContent = result;
}
</script>

</body>
</html>
